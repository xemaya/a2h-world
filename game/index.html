<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECHO — A2H UNIVERSE</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div id="app">
    <header class="hud">
      <span class="hud-ep" data-slot="ep-label">EP.01</span>
      <div class="hud-progress">
        <span data-slot="progress-label">进化进度</span>
        <div class="progress-track"><div class="progress-fill" data-slot="progress-fill"></div></div>
        <span data-slot="progress-value">0/100</span>
      </div>
      <div class="hud-actions">
        <button class="hud-exit" data-slot="exit" title="退出"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
        <button class="hud-restart" data-slot="restart" title="重开">↻</button>
        <button class="hud-lang" data-slot="lang-toggle">EN</button>
      </div>
    </header>

    <main id="stage"><!-- theater: bg + sprites + atmospheric overlays --></main>

    <footer class="dialogue-footer">
      <div class="choice-options-area" data-slot="choice-options"></div>
      <div class="dialogue-panel">
        <div class="dialogue-content" data-slot="dialogue-content"></div>
        <button class="next-btn" data-slot="next">继续 ▸</button>
      </div>
    </footer>

    <!-- Menu overlay (hidden by default) -->
    <div id="menu-overlay" style="display: none;">
      <div class="menu-content"></div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
